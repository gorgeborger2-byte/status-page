<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css?v=20260406k">
</head>
<body data-page="auth">
  <div class="shell" style="grid-template-columns:1fr; width:min(1040px,95vw);">
    <form id="loginForm" class="panel stack" style="max-width:560px;">
      <h3>Login</h3>
      <input id="loginUser" placeholder="Username" required>
      <input id="loginPass" type="password" placeholder="Password" required>
      <button id="loginSubmit" type="submit">Sign In</button>
      <p class="muted">Accounts are created by the boss from the admin panel.</p>
    </form>

    <p class="state" id="authState"></p>
    <p class="state" id="globalState"></p>
  </div>
  <script src="app.js?v=20260406k" defer></script>
</body>
</html>
