<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Guide Slides</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css?v=20260406k">
</head>
<body data-page="presentation">
  <div class="shell">
    <aside class="sidebar">
      <div class="brand"><div class="brand-mark"></div><div><h1>Cosmo Ops</h1><p id="whoami">Loading...</p></div></div>
      <nav class="nav">
        <a href="index.html">Status</a>
        <a class="active" href="presentation.html">Guide</a>
        <a href="commands.html">Commands</a>
        <a href="profile.html" data-auth-only>Profile</a>
        <a href="admin.html" data-boss-only>Admin</a>
        <button id="logoutBtn" data-auth-only>Logout</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div><h2>Support Guide (33 Slides)</h2><p>Built from your full slide source only.</p></div>
        <div class="topbar-actions"><span class="chip" id="slideCountChip">0 slides</span></div>
      </header>

      <section class="panel stack">
        <input id="guideSearch" placeholder="Search inside slide titles and content..." autocomplete="off">
        <p class="state" id="guideState"></p>
      </section>

      <section class="panel guide-layout">
        <aside class="guide-slides" id="slidesNav"></aside>
        <article class="guide-content">
          <h3 id="slideTitle">Select a slide</h3>
          <pre id="slideBody" class="slide-pre"></pre>
        </article>
      </section>
      <p class="state" id="globalState"></p>
    </main>
  </div>

  <nav class="mobile-nav">
    <a href="index.html">Status</a>
    <a class="active" href="presentation.html">Guide</a>
    <a href="commands.html">Commands</a>
    <a href="profile.html" data-auth-only>Profile</a>
    <a href="admin.html" data-boss-only>Admin</a>
    <button id="logoutBtnMobile" data-auth-only>Logout</button>
  </nav>

  <script src="app.js?v=20260406k" defer></script>
</body>
</html>
