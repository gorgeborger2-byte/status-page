<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmo Support Guide</title>
  <meta name="description" content="Compact support guide view.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Chakra+Petch:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="compact-page">
  <div class="halo halo-a" aria-hidden="true"></div>
  <div class="halo halo-b" aria-hidden="true"></div>

  <header class="container masthead">
    <nav class="top-nav" aria-label="Main">
      <a class="nav-link" href="index.html">Status</a>
      <a class="nav-link active" href="presentation.html">Support Guide</a>
    </nav>
    <h1>Cosmo Support Guide</h1>
    <p class="subtitle">Compact mode - one product at a time (no long scrolling)</p>
  </header>

  <main class="container">
    <section class="panel compact-panel">
      <div class="compact-controls">
        <input type="text" id="productSearch" placeholder="Search product..." autocomplete="off">
        <select id="productSelect"></select>
        <button id="prevBtn" type="button">Prev</button>
        <button id="nextBtn" type="button">Next</button>
      </div>

      <p class="status-line" id="positionLine"></p>

      <article class="guide-card single-guide-card" id="guideCard"></article>
    </section>
  </main>

  <footer class="container footer">
    <p>Fast lookup format from your docs style.</p>
  </footer>

  <script>
  (function () {
    var products = [
      {
        name: "AstroZoom",
        specs: [
          ["TPM", "(N/A) - ENABLED for COD"],
          ["Secure Boot", "DISABLED - ENABLED for COD"],
          ["Virtualization", "DISABLED"],
          ["Windows Defender", "DISABLED"],
          ["Windows Firewall", "DISABLED"],
          ["Exploit Protection", "DISABLED"]
        ],
        notes: [
          "Windows 10 22H2 to Windows 11 23H2 (COD supports newer builds).",
          "Connection timeout/hostname issues: use VPN.",
          "Error #13 / 0x2: unsupported Windows version."
        ]
      },
      {
        name: "Atlas",
        specs: [
          ["TPM", "(N/A) - ENABLED for COD"],
          ["Secure Boot", "DISABLED - ENABLED for COD"],
          ["Virtualization", "DISABLED"],
          ["Windows Defender", "DISABLED"],
          ["Windows Firewall", "DISABLED"],
          ["Exploit Protection", "ENABLED (Default)"]
        ],
        notes: [
          "Use Inspectre to disable Meltdown/Spectre when needed.",
          "Failed driver load: run sfc /scannow.",
          "Disable overlays for engine/fatal crashes."
        ]
      },
      {
        name: "Forge",
        specs: [
          ["TPM", "(N/A)"],
          ["Secure Boot", "DISABLED"],
          ["Virtualization", "DISABLED"],
          ["Windows Defender", "DISABLED"],
          ["Windows Firewall", "DISABLED"],
          ["Exploit Protection", "DISABLED"]
        ],
        notes: [
          "BSOD flow: sfc /scannow then DISM /Online /Cleanup-image /Restorehealth.",
          "Loader closes at 100%: sync PC time and run as admin."
        ]
      },
      {
        name: "Kane",
        specs: [
          ["TPM", "(N/A)"],
          ["Secure Boot", "DISABLED"],
          ["Virtualization", "ENABLED"],
          ["Windows Defender", "DISABLED"],
          ["Windows Firewall", "DISABLED"],
          ["Exploit Protection", "ENABLED (Default)"]
        ],
        notes: [
          "Use *kaneamdmenufix for vc_redist/libs errors.",
          "No available servers: use VPN.",
          "Error 0x298: contact dev."
        ]
      },
      {
        name: "Liquid",
        specs: [
          ["TPM", "(N/A)"],
          ["Secure Boot", "DISABLED"],
          ["Virtualization", "ENABLED"],
          ["Windows Defender", "DISABLED"],
          ["Windows Firewall", "DISABLED"],
          ["Exploit Protection", "ENABLED (Default)"]
        ],
        notes: [
          "EFT Chams: press F1 in main menu to inject.",
          "Use Steelseries GG sonar shortcut flow where required."
        ]
      },
      {
        name: "Pulse",
        specs: [
          ["TPM", "(N/A)"],
          ["Secure Boot", "DISABLED"],
          ["Virtualization", "DISABLED"],
          ["Windows Defender", "DISABLED"],
          ["Windows Firewall", "DISABLED"],
          ["Exploit Protection", "DISABLED"]
        ],
        notes: [
          "ARC inject issue: disable startup apps and overlays.",
          "Inject first, then open launcher/game flow."
        ]
      },
      {
        name: "VEX",
        specs: [
          ["TPM", "(N/A)"],
          ["Secure Boot", "DISABLED"],
          ["Virtualization", "DISABLED"],
          ["Windows Defender", "DISABLED"],
          ["Windows Firewall", "DISABLED"],
          ["Exploit Protection", "DISABLED"]
        ],
        notes: [
          "Warthunder: must run DX11.",
          "Connection issues: run network manager IP optimizer."
        ]
      },
      {
        name: "Viper",
        specs: [
          ["TPM", "(N/A)"],
          ["Secure Boot", "(N/A)"],
          ["Virtualization", "(N/A)"],
          ["Windows Defender", "DISABLED"],
          ["Windows Firewall", "DISABLED"],
          ["Exploit Protection", "ENABLED (Default)"]
        ],
        notes: [
          "Disable all overlays and antivirus.",
          "Failed stream: VPN + Cloudflare DNS.",
          "Steam only (except ARC Raiders)."
        ]
      },
      {
        name: "Volt",
        specs: [
          ["TPM", "DISABLED"],
          ["Secure Boot", "DISABLED"],
          ["Virtualization", "ENABLED"],
          ["Windows Defender", "DISABLED"],
          ["Windows Firewall", "DISABLED"],
          ["Exploit Protection", "DISABLED"]
        ],
        notes: [
          "Framework errors: install required .NET runtime packages.",
          "HVIX/HVAX not found: run sfc /scannow."
        ]
      },
      {
        name: "Refund / Compensation / HWID",
        specs: [
          ["Refund info", "Need key + order + key length + game"],
          ["Compensation", "For major downtime/troubleshooting"],
          ["HWID reset", "Escalate to senior support"]
        ],
        notes: [
          "Use senior review when case is unclear."
        ]
      }
    ];

    var filtered = products.slice();
    var current = 0;

    var searchEl = document.getElementById("productSearch");
    var selectEl = document.getElementById("productSelect");
    var prevBtn = document.getElementById("prevBtn");
    var nextBtn = document.getElementById("nextBtn");
    var lineEl = document.getElementById("positionLine");
    var cardEl = document.getElementById("guideCard");

    function renderSelect() {
      selectEl.innerHTML = filtered.map(function (p, i) {
        return "<option value=\"" + i + "\">" + p.name + "</option>";
      }).join("");
      selectEl.value = String(current);
    }

    function renderCard() {
      if (!filtered.length) {
        cardEl.innerHTML = "<h3>No match</h3><p>Try another search keyword.</p>";
        lineEl.textContent = "0 / 0";
        return;
      }

      var item = filtered[current];
      var specRows = item.specs.map(function (row) {
        return "<p><span>" + row[0] + "</span><strong>" + row[1] + "</strong></p>";
      }).join("");
      var noteRows = item.notes.map(function (n) {
        return "<li>" + n + "</li>";
      }).join("");

      cardEl.innerHTML = "<h3>" + item.name + "</h3><div class=\"spec-table\">" + specRows + "</div><ul>" + noteRows + "</ul>";
      lineEl.textContent = (current + 1) + " / " + filtered.length;
      selectEl.value = String(current);
    }

    function applySearch() {
      var q = searchEl.value.toLowerCase().trim();
      filtered = products.filter(function (p) {
        var text = (p.name + " " + p.notes.join(" ") + " " + p.specs.map(function (s) { return s.join(" "); }).join(" ")).toLowerCase();
        return !q || text.indexOf(q) !== -1;
      });
      current = 0;
      renderSelect();
      renderCard();
    }

    searchEl.addEventListener("input", applySearch);
    selectEl.addEventListener("change", function () {
      current = Number(selectEl.value) || 0;
      renderCard();
    });

    prevBtn.addEventListener("click", function () {
      if (!filtered.length) return;
      current = (current - 1 + filtered.length) % filtered.length;
      renderCard();
    });

    nextBtn.addEventListener("click", function () {
      if (!filtered.length) return;
      current = (current + 1) % filtered.length;
      renderCard();
    });

    renderSelect();
    renderCard();
  })();
  </script>
</body>
</html>
