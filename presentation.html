    function copyText(text, label) {
      if (!text) return;
      function done() {
        lineEl.textContent = label + " copied";
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done);
        return;
      }
      var ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      done();
    }

    function unique(arr) {
      var map = {};
      return arr.filter(function (v) {
        var key = v.toLowerCase();
        if (map[key]) return false;
        map[key] = true;
        return true;
      });
    }

    function buildAllDataText() {
      return products.map(function (item) {
        var requirementsText = item.specs.map(function (row) { return row[0] + ": " + row[1]; }).join("\n");
        var fixesText = item.notes.join("\n");
        var linksText = (item.links || []).map(function (link) { return link[0] + ": " + link[1]; }).join("\n");
        var commands = unique((requirementsText + "\n" + fixesText).match(/\*[a-z0-9_]+/gi) || []).join("\n");
        return [
          "===== " + item.name + " =====",
          "Requirements:",
          requirementsText || "(none)",
          "",
          "Fixes:",
          fixesText || "(none)",
          "",
          "Commands:",
          commands || "(none)",
          "",
          "Links:",
          linksText || "(none)"
        ].join("\n");
      }).join("\n\n");
    }

    var searchAliases = [
      ["ow2", "overwatch 2"],
      ["overwatch 2", "ow2"],
      ["cod", "call of duty"],
      ["call of duty", "cod"],
      ["fn", "fortnite"],
      ["fortnite", "fn"],
      ["abi", "arena breakout infinite"],
      ["arena breakout infinite", "abi"],
      ["eft", "escape from tarkov"],
      ["escape from tarkov", "eft"],
      ["r6", "rainbow six siege"],
      ["rainbow six siege", "r6"],
      ["cs2", "counter strike 2"],
      ["counter strike 2", "cs2"],
      ["df", "delta force"],
      ["delta force", "df"],
      ["wt", "warthunder"],
      ["warthunder", "wt"],
      ["arc", "arc raiders"],
      ["arc raiders", "arc"]
    ];

    function withAliases(text) {
      var lower = text.toLowerCase();
      var extra = [];
      searchAliases.forEach(function (pair) {
        if (lower.indexOf(pair[0]) !== -1) {
          extra.push(pair[1]);
        }
      });
      return lower + " " + extra.join(" ");
    }

    function normalizeText(text) {
      return text.toLowerCase().replace(/[^a-z0-9]+/g, " ");
    }

    function updateFullTextSearch(q, normalizedQuery) {
      if (!fullSlidesText) {
        fullTextSearchStateEl.textContent = "Slide text not loaded yet.";
        return;
      }
      if (!q) {
        fullTextSearchStateEl.textContent = "Showing full slide export text.";
        return;
      }

      var plainIndex = fullSlidesText.toLowerCase().indexOf(q);
      var normalizedIndex = normalizedQuery ? fullSlidesTextNormalized.indexOf(normalizedQuery) : -1;
      var found = plainIndex !== -1 || normalizedIndex !== -1;
      fullTextSearchStateEl.textContent = found ? "Search also found in full slide text." : "No full-text match for this search.";
    }

    function loadFullSlidesText() {
      fetch("slides_full.txt?t=" + Date.now(), { cache: "no-store" })
        .then(function (res) {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.text();
        })
        .then(function (txt) {
          fullSlidesText = txt.replace(/\u000b/g, "\n").replace(/\r\n/g, "\n");
          fullSlidesTextNormalized = normalizeText(withAliases(fullSlidesText));
          fullSlidesTextEl.textContent = fullSlidesText;
          fullTextSearchStateEl.textContent = "Showing full slide export text.";
        })
        .catch(function () {
          fullSlidesText = "Could not load full slide text file.";
          fullSlidesTextNormalized = normalizeText(fullSlidesText);
          fullSlidesTextEl.textContent = fullSlidesText;
          fullTextSearchStateEl.textContent = "Failed to load full slide text.";
        });
    }

    function renderSelect() {
      selectEl.innerHTML = filtered.map(function (p, i) {
        return "<option value=\"" + i + "\">" + p.name + "</option>";
      }).join("");
      selectEl.value = String(current);
    }

    function renderCard() {
      if (!filtered.length) {
        cardEl.innerHTML = "<h3>No match</h3><p>Try another search keyword.</p>";
        lineEl.textContent = "0 / 0";
        return;
      }

      var item = filtered[current];
      var specRows = item.specs.map(function (row) {
        return "<p><span>" + row[0] + "</span><strong>" + row[1] + "</strong></p>";
      }).join("");
      var noteRows = item.notes.map(function (n) {
        return "<li>" + n + "</li>";
      }).join("");

      var requirementsText = item.specs.map(function (row) {
        return row[0] + ": " + row[1];
      }).join("\n");
      var fixesText = item.notes.join("\n");
      var linksText = (item.links || []).map(function (link) {
        return link[0] + ": " + link[1];
      }).join("\n");

      var commandSource = requirementsText + "\n" + fixesText;
      var commands = unique((commandSource.match(/\*[a-z0-9_]+/gi) || []));
      var fullCardText = [
        item.name,
        "",
        "Requirements",
        requirementsText,
        "",
        "Fixes",
        fixesText,
        "",
        "Commands",
        commands.join("\n") || "(none)",
        "",
        "Links",
        linksText || "(none)"
      ].join("\n");
      var commandButtons = commands.length
        ? commands.map(function (cmd) {
            return "<button type=\"button\" class=\"cmd-chip\" data-cmd=\"" + cmd + "\">" + cmd + "</button>";
          }).join("")
        : "<span class=\"cmd-empty\">No commands in this section</span>";

      var linkRows = "";
      if (item.links && item.links.length) {
        linkRows = "<h4>Links</h4><ul>" + item.links.map(function (link) {
          return "<li><a class=\"footer-link\" href=\"" + link[1] + "\" target=\"_blank\" rel=\"noreferrer\">" + link[0] + "</a></li>";
        }).join("") + "</ul>";
      }

      cardEl.innerHTML = "<h3>" + item.name + "</h3>"
        + "<div class=\"copy-row\">"
        + "<button type=\"button\" class=\"copy-btn\" id=\"copyReq\">Copy Requirements</button>"
        + "<button type=\"button\" class=\"copy-btn\" id=\"copyFix\">Copy Fixes</button>"
        + "<button type=\"button\" class=\"copy-btn\" id=\"copyCmd\">Copy Commands</button>"
        + "<button type=\"button\" class=\"copy-btn\" id=\"copyLinks\">Copy Links</button>"
        + "<button type=\"button\" class=\"copy-btn\" id=\"copyAll\">Copy Full Card</button>"
        + "</div>"
        + "<div class=\"spec-table\">" + specRows + "</div>"
        + "<h4>Important Fixes / Notes</h4><ul>" + noteRows + "</ul>"
        + "<h4>Commands</h4><div class=\"cmd-row\">" + commandButtons + "</div>"
        + linkRows;

      var copyReqBtn = document.getElementById("copyReq");
      var copyFixBtn = document.getElementById("copyFix");
      var copyCmdBtn = document.getElementById("copyCmd");
      var copyLinksBtn = document.getElementById("copyLinks");
      var copyAllBtn = document.getElementById("copyAll");

      copyReqBtn.addEventListener("click", function () {
        copyText(requirementsText, "Requirements");
      });
      copyFixBtn.addEventListener("click", function () {
        copyText(fixesText, "Fixes");
      });
      copyCmdBtn.addEventListener("click", function () {
        copyText(commands.join("\n"), "Commands");
      });
      copyLinksBtn.addEventListener("click", function () {
        copyText(linksText || "(none)", "Links");
      });
      copyAllBtn.addEventListener("click", function () {
        copyText(fullCardText, "Full card");
      });

      Array.prototype.slice.call(cardEl.querySelectorAll(".cmd-chip")).forEach(function (btn) {
        btn.addEventListener("click", function () {
          copyText(btn.getAttribute("data-cmd"), "Command");
        });
      });

      lineEl.textContent = (current + 1) + " / " + filtered.length;
      selectEl.value = String(current);
    }

    function applySearch() {
      var q = searchEl.value.toLowerCase().trim();
      var normalizedQuery = q.replace(/[^a-z0-9]+/g, " ").trim();
      filtered = products.filter(function (p) {
        var linkText = (p.links || []).map(function (l) { return l.join(" "); }).join(" ");
        var text = withAliases(p.name + " " + p.notes.join(" ") + " " + p.specs.map(function (s) { return s.join(" "); }).join(" ") + " " + linkText);
        var normalizedText = normalizeText(text);
        return !q || text.indexOf(q) !== -1 || (normalizedQuery && normalizedText.indexOf(normalizedQuery) !== -1);
      });
      current = 0;
      renderSelect();
      renderCard();
      updateFullTextSearch(q, normalizedQuery);
    }

    searchEl.addEventListener("input", applySearch);
    selectEl.addEventListener("change", function () {
      current = Number(selectEl.value) || 0;
      renderCard();
    });

    prevBtn.addEventListener("click", function () {
      if (!filtered.length) return;
      current = (current - 1 + filtered.length) % filtered.length;
      renderCard();
    });

    nextBtn.addEventListener("click", function () {
      if (!filtered.length) return;
      current = (current + 1) % filtered.length;
      renderCard();
    });

    copyAllDataBtn.addEventListener("click", function () {
      copyText(buildAllDataText(), "All data");
    });

    copySlidesTextBtn.addEventListener("click", function () {
      copyText(fullSlidesText || "", "Full slide text");
    });

    renderSelect();
    renderCard();
    loadFullSlidesText();
  })();
  </script>
</body>
</html>
