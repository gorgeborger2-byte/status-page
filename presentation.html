    var filtered = products.slice();

    var lineEl = document.getElementById("positionLine");
    var cardsEl = document.getElementById("guideCards");

    function copyText(text, label) {
      if (!text) return;
      function done() {
        lineEl.textContent = label + " copied";
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done);
        return;
      }
      var ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      done();
    }

    function unique(arr) {
      var map = {};
      return arr.filter(function (v) {
        var key = v.toLowerCase();
        if (map[key]) return false;
        map[key] = true;
        return true;
      });
    }

    function escapeHtml(text) {
      return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function getRequirements(item) {
      return item.specs.map(function (row) { return row[0] + ": " + row[1]; }).join("\n");
    }

    function getFixes(item) {
      return item.notes.join("\n");
    }

    function getRaw(item) {
      return item.raw || getFixes(item);
    }

    function getCommands(item) {
      var source = getRequirements(item) + "\n" + getRaw(item);
      return unique(source.match(/\*[a-z0-9_]+/gi) || []);
    }

    function renderCards() {
      if (!filtered.length) {
        cardsEl.innerHTML = "<article class=\"guide-card\"><h3>No match</h3><p>Try another search keyword.</p></article>";
        lineEl.textContent = "0 products";
        return;
      }

      cardsEl.innerHTML = filtered.map(function (item, index) {
        var specRows = item.specs.map(function (row) {
          return "<p><span>" + row[0] + "</span><strong>" + row[1] + "</strong></p>";
        }).join("");
        var noteRows = item.notes.map(function (n) {
          return "<li>" + n + "</li>";
        }).join("");
        var rawText = getRaw(item);
        var commands = getCommands(item);
        var commandButtons = commands.length
          ? commands.map(function (cmd) {
              return "<button type=\"button\" class=\"cmd-chip\" data-cmd=\"" + cmd + "\">" + cmd + "</button>";
            }).join("")
          : "<span class=\"cmd-empty\">No commands in this section</span>";

        var linkRows = "";
        if (item.links && item.links.length) {
          linkRows = "<h4>Links</h4><ul>" + item.links.map(function (link) {
            return "<li><a class=\"footer-link\" href=\"" + link[1] + "\" target=\"_blank\" rel=\"noreferrer\">" + link[0] + "</a></li>";
          }).join("") + "</ul>";
        }

        return "<article class=\"guide-card\" data-index=\"" + index + "\">"
          + "<h3>" + item.name + "</h3>"
          + "<div class=\"copy-row\">"
          + "<button type=\"button\" class=\"copy-btn\" data-action=\"req\">Copy Requirements</button>"
          + "<button type=\"button\" class=\"copy-btn\" data-action=\"fix\">Copy Fixes</button>"
          + "<button type=\"button\" class=\"copy-btn\" data-action=\"cmd\">Copy Commands</button>"
          + "<button type=\"button\" class=\"copy-btn\" data-action=\"raw\">Copy Raw Slide Text</button>"
          + "</div>"
          + "<div class=\"spec-table\">" + specRows + "</div>"
          + "<h4>Important Fixes / Notes</h4><ul>" + noteRows + "</ul>"
          + "<h4>Original Slide Text</h4><pre class=\"raw-block\">" + escapeHtml(rawText) + "</pre>"
          + "<h4>Commands</h4><div class=\"cmd-row\">" + commandButtons + "</div>"
          + linkRows
          + "</article>";
      }).join("");

      lineEl.textContent = filtered.length + " products shown";
    }

    function applySearch() {
      var q = searchEl.value.toLowerCase().trim();
      filtered = products.filter(function (p) {
        var linkText = (p.links || []).map(function (l) { return l.join(" "); }).join(" ");
        var text = (p.name + " " + p.notes.join(" ") + " " + p.specs.map(function (s) { return s.join(" "); }).join(" ") + " " + linkText + " " + (p.raw || "")).toLowerCase();
        return !q || text.indexOf(q) !== -1;
      });
      renderCards();
    }

    searchEl.addEventListener("input", applySearch);
    cardsEl.addEventListener("click", function (event) {
      var actionBtn = event.target.closest(".copy-btn");
      if (actionBtn) {
        var card = actionBtn.closest(".guide-card");
        if (!card) return;
        var idx = Number(card.getAttribute("data-index"));
        var item = filtered[idx];
        if (!item) return;
        var action = actionBtn.getAttribute("data-action");
        if (action === "req") copyText(getRequirements(item), "Requirements");
        if (action === "fix") copyText(getFixes(item), "Fixes");
        if (action === "cmd") copyText(getCommands(item).join("\n"), "Commands");
        if (action === "raw") copyText(getRaw(item), "Raw slide text");
        return;
      }

      var chip = event.target.closest(".cmd-chip");
      if (chip) {
        copyText(chip.getAttribute("data-cmd"), "Command");
      }
    });

    renderCards();
  })();
