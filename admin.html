<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="space-bg" aria-hidden="true">
    <div class="space-nebula"></div>
    <div class="space-stars space-stars-a"></div>
    <div class="space-stars space-stars-b"></div>
  </div>

  <main class="container admin-wrap">
    <section class="panel">
      <h1>Admin Panel</h1>
      <p class="subtitle">Approve users, assign roles, remove users, edit website text, add/remove custom items.</p>
      <p id="adminState" class="status-line"></p>
      <p><a class="footer-link" href="index.html">Back to status page</a></p>
    </section>

    <section class="panel">
      <h2>Users</h2>
      <div id="usersTable"></div>
    </section>

    <section class="panel">
      <h2>Website Content</h2>
      <form id="contentForm" class="stack-form">
        <input id="heroTitle" placeholder="Hero title">
        <input id="heroSubtitle" placeholder="Hero subtitle">
        <input id="announcement" placeholder="Announcement text">
        <button type="submit">Save Content</button>
      </form>
    </section>

    <section class="panel">
      <h2>Manual Items</h2>
      <form id="itemForm" class="stack-form">
        <input id="itemBrand" placeholder="Brand" required>
        <input id="itemGame" placeholder="Game" required>
        <input id="itemStatus" placeholder="Status (Updating/Testing)" required>
        <input id="itemUpdated" placeholder="Updated label (optional)">
        <button type="submit">Add Item</button>
      </form>
      <div id="itemsTable"></div>
    </section>
  </main>

  <script src="auth-local.js"></script>
  <script>
  (function () {
  const adminState = document.getElementById("adminState");
  const currentAdmin = GrizzAuth.requireAdminSession("auth.html");
  if (!currentAdmin) {
    return;
  }

  function formatDate(value) {
    if (!value) return "-";
    const d = new Date(value);
    return Number.isNaN(d.getTime()) ? value : d.toLocaleString();
  }

  function loadUsers() {
    const users = GrizzAuth.listUsers();
    const rows = users.map((u) => {
      return `<tr>
        <td>${u.username}</td>
        <td>${u.role}</td>
        <td>${u.banned ? "Banned" : (u.approved ? "Approved" : "Pending")}</td>
        <td>${formatDate(u.lastSeen)}</td>
        <td>
          <button data-approve="${u.id}" data-val="true">Approve</button>
          <button data-approve="${u.id}" data-val="false">Unapprove</button>
          <button data-ban="${u.id}" data-val="true">Ban</button>
          <button data-ban="${u.id}" data-val="false">Unban</button>
          <button data-role="${u.id}" data-val="support">Make Support</button>
          <button data-role="${u.id}" data-val="admin">Make Admin</button>
          <button data-delete="${u.id}">Remove</button>
        </td>
      </tr>`;
    }).join("");
    document.getElementById("usersTable").innerHTML = `<table class="admin-table"><thead><tr><th>User</th><th>Role</th><th>Status</th><th>Last Seen</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table>`;
  }

  function loadContentAndItems() {
    const content = GrizzAuth.getSiteContent();
    const items = GrizzAuth.getManualItems();
    document.getElementById("heroTitle").value = content.heroTitle || "";
    document.getElementById("heroSubtitle").value = content.subtitle || "";
    document.getElementById("announcement").value = content.announcement || "";

    const rows = items.map((i) => `<tr><td>${i.brand}</td><td>${i.game}</td><td>${i.status}</td><td>${i.updated || ""}</td><td><button data-remove-item="${i.id}">Remove</button></td></tr>`).join("");
    document.getElementById("itemsTable").innerHTML = `<table class="admin-table"><thead><tr><th>Brand</th><th>Game</th><th>Status</th><th>Updated</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table>`;
  }

  document.getElementById("usersTable").addEventListener("click", (e) => {
    const target = e.target;
    try {
      if (target.dataset.approve) {
        GrizzAuth.updateUser(target.dataset.approve, { approved: target.dataset.val === "true" });
      }
      if (target.dataset.ban) {
        GrizzAuth.updateUser(target.dataset.ban, { banned: target.dataset.val === "true" });
      }
      if (target.dataset.role) {
        GrizzAuth.updateUser(target.dataset.role, { role: target.dataset.val });
      }
      if (target.dataset.delete) {
        GrizzAuth.removeUser(target.dataset.delete, currentAdmin.id);
      }
      loadUsers();
      adminState.textContent = "User update saved.";
    } catch (err) {
      adminState.textContent = err.message;
    }
  });

  document.getElementById("contentForm").addEventListener("submit", (e) => {
    e.preventDefault();
    try {
      GrizzAuth.setSiteContent({
        heroTitle: document.getElementById("heroTitle").value,
        subtitle: document.getElementById("heroSubtitle").value,
        announcement: document.getElementById("announcement").value
      });
      adminState.textContent = "Website content saved.";
    } catch (err) {
      adminState.textContent = err.message;
    }
  });

  document.getElementById("itemForm").addEventListener("submit", (e) => {
    e.preventDefault();
    try {
      GrizzAuth.addManualItem({
        brand: document.getElementById("itemBrand").value,
        game: document.getElementById("itemGame").value,
        status: document.getElementById("itemStatus").value,
        updated: document.getElementById("itemUpdated").value
      });
      e.target.reset();
      loadContentAndItems();
      adminState.textContent = "Manual item added.";
    } catch (err) {
      adminState.textContent = err.message;
    }
  });

  document.getElementById("itemsTable").addEventListener("click", (e) => {
    const id = e.target.dataset.removeItem;
    if (!id) return;
    try {
      GrizzAuth.removeManualItem(id);
      loadContentAndItems();
      adminState.textContent = "Manual item removed.";
    } catch (err) {
      adminState.textContent = err.message;
    }
  });

  GrizzAuth.touch();
  loadUsers();
  loadContentAndItems();
  })();
  </script>
</body>
</html>
