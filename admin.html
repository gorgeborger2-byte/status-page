<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="space-bg" aria-hidden="true">
    <div class="space-nebula"></div>
    <div class="space-stars space-stars-a"></div>
    <div class="space-stars space-stars-b"></div>
  </div>

  <main class="container admin-wrap">
    <section class="panel">
      <h1>Admin Panel</h1>
      <p class="subtitle">Approve users, assign roles, remove users, edit website text, add/remove custom items.</p>
      <p id="adminState" class="status-line"></p>
      <p><a class="footer-link" href="index.html">Back to status page</a></p>
    </section>

    <section class="panel">
      <h2>Users</h2>
      <div id="usersTable"></div>
    </section>

    <section class="panel">
      <h2>Website Content</h2>
      <form id="contentForm" class="stack-form">
        <input id="heroTitle" placeholder="Hero title">
        <input id="heroSubtitle" placeholder="Hero subtitle">
        <input id="announcement" placeholder="Announcement text">
        <button type="submit">Save Content</button>
      </form>
    </section>

    <section class="panel">
      <h2>Manual Items</h2>
      <form id="itemForm" class="stack-form">
        <input id="itemBrand" placeholder="Brand" required>
        <input id="itemGame" placeholder="Game" required>
        <input id="itemStatus" placeholder="Status (Updating/Testing)" required>
        <input id="itemUpdated" placeholder="Updated label (optional)">
        <button type="submit">Add Item</button>
      </form>
      <div id="itemsTable"></div>
    </section>
  </main>

  <script>
  const adminState = document.getElementById("adminState");

  async function api(url, options = {}) {
    const res = await fetch(url, Object.assign({ credentials: "same-origin" }, options));
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || "Request failed");
    return data;
  }

  function formatDate(value) {
    if (!value) return "-";
    const d = new Date(value);
    return Number.isNaN(d.getTime()) ? value : d.toLocaleString();
  }

  async function ensureAdmin() {
    try {
      const me = await api("/api/auth/me");
      if (!me.user || me.user.role !== "admin") {
        window.location.href = "auth.html";
        return false;
      }
      return true;
    } catch {
      window.location.href = "auth.html";
      return false;
    }
  }

  async function loadUsers() {
    const out = await api("/api/admin/users");
    const rows = out.users.map((u) => {
      return `<tr>
        <td>${u.username}</td>
        <td>${u.role}</td>
        <td>${u.approved ? "Approved" : "Pending"}</td>
        <td>${formatDate(u.lastSeen)}</td>
        <td>
          <button data-approve="${u.id}" data-val="true">Approve</button>
          <button data-approve="${u.id}" data-val="false">Unapprove</button>
          <button data-role="${u.id}" data-val="support">Make Support</button>
          <button data-role="${u.id}" data-val="admin">Make Admin</button>
          <button data-delete="${u.id}">Remove</button>
        </td>
      </tr>`;
    }).join("");

    document.getElementById("usersTable").innerHTML = `<table class="admin-table"><thead><tr><th>User</th><th>Role</th><th>Status</th><th>Last Seen</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table>`;
  }

  async function loadContentAndItems() {
    const out = await api("/api/admin/content");
    document.getElementById("heroTitle").value = out.siteContent.heroTitle || "";
    document.getElementById("heroSubtitle").value = out.siteContent.subtitle || "";
    document.getElementById("announcement").value = out.siteContent.announcement || "";

    const rows = (out.manualItems || []).map((i) => `<tr><td>${i.brand}</td><td>${i.game}</td><td>${i.status}</td><td>${i.updated || ""}</td><td><button data-remove-item="${i.id}">Remove</button></td></tr>`).join("");
    document.getElementById("itemsTable").innerHTML = `<table class="admin-table"><thead><tr><th>Brand</th><th>Game</th><th>Status</th><th>Updated</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table>`;
  }

  document.getElementById("usersTable").addEventListener("click", async (e) => {
    const target = e.target;
    try {
      if (target.dataset.approve) {
        await api(`/api/admin/users/${target.dataset.approve}/approve`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ approved: target.dataset.val === "true" })
        });
      }
      if (target.dataset.role) {
        await api(`/api/admin/users/${target.dataset.role}/role`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ role: target.dataset.val })
        });
      }
      if (target.dataset.delete) {
        await api(`/api/admin/users/${target.dataset.delete}`, { method: "DELETE" });
      }
      await loadUsers();
      adminState.textContent = "User update saved.";
    } catch (err) {
      adminState.textContent = err.message;
    }
  });

  document.getElementById("contentForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    try {
      await api("/api/admin/content", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          heroTitle: document.getElementById("heroTitle").value,
          subtitle: document.getElementById("heroSubtitle").value,
          announcement: document.getElementById("announcement").value
        })
      });
      adminState.textContent = "Website content saved.";
    } catch (err) {
      adminState.textContent = err.message;
    }
  });

  document.getElementById("itemForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    try {
      await api("/api/admin/manual-items", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          brand: document.getElementById("itemBrand").value,
          game: document.getElementById("itemGame").value,
          status: document.getElementById("itemStatus").value,
          updated: document.getElementById("itemUpdated").value
        })
      });
      e.target.reset();
      await loadContentAndItems();
      adminState.textContent = "Manual item added.";
    } catch (err) {
      adminState.textContent = err.message;
    }
  });

  document.getElementById("itemsTable").addEventListener("click", async (e) => {
    const id = e.target.dataset.removeItem;
    if (!id) return;
    try {
      await api(`/api/admin/manual-items/${id}`, { method: "DELETE" });
      await loadContentAndItems();
      adminState.textContent = "Manual item removed.";
    } catch (err) {
      adminState.textContent = err.message;
    }
  });

  (async function init() {
    if (!(await ensureAdmin())) return;
    await loadUsers();
    await loadContentAndItems();
  })();
  </script>
</body>
</html>
