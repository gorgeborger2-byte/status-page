<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css?v=20260406k">
</head>
<body data-page="profile">
  <div class="shell">
    <aside class="sidebar">
      <div class="brand"><div class="brand-mark"></div><div><h1>Cosmo Ops</h1><p id="whoami">Loading...</p></div></div>
      <nav class="nav">
        <a href="index.html">Status</a>
        <a href="presentation.html">Guide</a>
        <a href="commands.html">Commands</a>
        <a class="active" href="profile.html">Profile</a>
        <a href="admin.html" data-boss-only>Admin</a>
        <button id="logoutBtn" data-auth-only>Logout</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div><h2 id="profileName">My Profile</h2><p id="profileRole">Role</p></div>
        <div class="topbar-actions">
          <span class="chip">Created: <span id="profileCreated">-</span></span>
          <span class="chip">Last Seen: <span id="profileSeen">-</span></span>
        </div>
      </header>

      <div class="grid-2">
        <form id="nicknameForm" class="panel stack">
          <h3>Nickname</h3>
          <input id="nicknameInput" placeholder="New nickname" required>
          <button type="submit">Save Nickname</button>
          <p class="muted" id="nicknameHint"></p>
        </form>

        <form id="passwordForm" class="panel stack">
          <h3>Password</h3>
          <input id="currentPassword" type="password" placeholder="Current password" required>
          <input id="newPassword" type="password" placeholder="New password" required>
          <button type="submit">Update Password</button>
        </form>
      </div>
      <p class="state" id="profileState"></p>
      <p class="state" id="globalState"></p>
    </main>
  </div>

  <nav class="mobile-nav">
    <a href="index.html">Status</a>
    <a href="presentation.html">Guide</a>
    <a href="commands.html">Commands</a>
    <a class="active" href="profile.html">Profile</a>
    <a href="admin.html" data-boss-only>Admin</a>
    <button id="logoutBtnMobile" data-auth-only>Logout</button>
  </nav>

  <script src="app.js?v=20260406k" defer></script>
</body>
</html>
