<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="space-bg" aria-hidden="true">
    <div class="space-nebula"></div>
    <div class="space-stars space-stars-a"></div>
    <div class="space-stars space-stars-b"></div>
  </div>

  <header class="container masthead">
    <nav class="top-nav" aria-label="Main">
      <a class="nav-link" href="index.html">Status</a>
      <a class="nav-link" href="presentation.html">Support Guide</a>
      <a class="nav-link" href="commands.html">Commands</a>
      <a class="nav-link active" href="profile.html">Profile</a>
      <a class="nav-link" id="adminLink" href="admin.html" style="display:none;">Admin</a>
      <a class="nav-link" id="logoutLink" href="#">Logout</a>
    </nav>
  </header>

  <main class="container auth-wrap">
    <section class="panel profile-wrap">
      <h1>My Profile</h1>
      <p class="subtitle">Set your nickname and secure your account password.</p>
      <div id="profileBadge" class="profile-display role-owner role-glow">No Nickname</div>
      <p id="profileState" class="status-line"></p>
      <div class="profile-grid">
        <article class="profile-card">
          <h2>Identity</h2>
          <p class="mini-muted" id="identityInfo"></p>
          <form id="nicknameForm" class="stack-form">
            <input id="nicknameInput" placeholder="Nickname" required>
            <button type="submit">Save Nickname</button>
          </form>
          <p class="status-line" id="nicknameCooldown"></p>
        </article>

        <article class="profile-card">
          <h2>Change Password</h2>
          <form id="passwordForm" class="stack-form">
            <input id="currentPassword" type="password" placeholder="Current password" required>
            <input id="newPassword" type="password" placeholder="New password" required>
            <button type="submit">Update Password</button>
          </form>
        </article>
      </div>

      <p><a class="footer-link" href="index.html">Back to status page</a></p>
    </section>
  </main>

  <script src="guard.js" defer></script>
  <script src="auth-local.js"></script>
  <script>
  (function () {
    const stateEl = document.getElementById("profileState");
    const profileBadgeEl = document.getElementById("profileBadge");
    let user = null;

    document.getElementById("logoutLink").addEventListener("click", (e) => {
      e.preventDefault();
      GrizzAuth.logout().then(function () {
        window.location.replace("auth.html");
      });
    });

    function formatDate(value) {
      if (!value) return "-";
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? value : d.toLocaleString();
    }

    async function renderIdentity() {
      const current = GrizzAuth.getCurrentUser();
      if (!current) {
        window.location.replace("auth.html");
        return;
      }
      const roleClass = current.role === "owner" || current.role === "coder" ? `role-${current.role}` : "";
      const glowClass = current.roleStyle && current.roleStyle.glow ? "role-glow" : "";
      const roleStyle = current.roleStyle || {};
      profileBadgeEl.className = `profile-display ${roleClass} ${glowClass}`.trim();
      profileBadgeEl.style.setProperty("--role-color", roleStyle.color || "#9bb5da");
      profileBadgeEl.style.setProperty("--role-accent", roleStyle.accent || "#4666b3");
      profileBadgeEl.textContent = current.displayName || "No Nickname";

      document.getElementById("identityInfo").textContent = `Role: ${current.roleLabel} | Usernames are private to regular users.`;
      document.getElementById("nicknameInput").value = current.nickname || "";

      const cooldown = await GrizzAuth.getNicknameCooldown();
      if (cooldown.canChange) {
        document.getElementById("nicknameCooldown").textContent = "Nickname can be changed now.";
      } else {
        document.getElementById("nicknameCooldown").textContent = `Next nickname change: ${formatDate(cooldown.nextAllowedAt)}`;
      }
    }

    document.getElementById("nicknameForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        const current = GrizzAuth.getCurrentUser();
        await GrizzAuth.updateNickname(current.id, document.getElementById("nicknameInput").value);
        await renderIdentity();
        stateEl.textContent = "Nickname saved.";
      } catch (err) {
        stateEl.textContent = err.message;
      }
    });

    document.getElementById("passwordForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        const current = GrizzAuth.getCurrentUser();
        await GrizzAuth.changePassword(
          current.id,
          document.getElementById("currentPassword").value,
          document.getElementById("newPassword").value
        );
        e.target.reset();
        stateEl.textContent = "Password updated successfully.";
      } catch (err) {
        stateEl.textContent = err.message;
      }
    });

    (async function boot() {
      await GrizzAuth.init();
      user = GrizzAuth.requireApprovedSession("auth.html");
      if (!user) return;
      await GrizzAuth.touch();
      if (GrizzAuth.hasAdminAccess(user)) {
        document.getElementById("adminLink").style.display = "inline-flex";
      }
      await renderIdentity();
    })();
  })();
  </script>
</body>
</html>
