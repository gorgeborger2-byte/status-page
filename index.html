<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmo Product Status</title>
  <meta name="description" content="Live product status board showing only Updating and Testing states.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Chakra+Petch:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="halo halo-a" aria-hidden="true"></div>
  <div class="halo halo-b" aria-hidden="true"></div>

  <header class="container masthead">
    <h1>Cosmo Product Status</h1>
    <p class="subtitle">Only products currently in <strong>Updating</strong> or <strong>Testing</strong></p>
    <div class="meta">
      <span id="sourceTime">Source last updated: --</span>
      <span id="fetchedTime">Synced: --</span>
    </div>
  </header>

  <main class="container">
    <section class="panel" aria-live="polite">
      <div class="panel-head">
        <h2>Live Queue</h2>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
      <p id="statusLine" class="status-line">Loading status feed...</p>
      <div id="cards" class="cards"></div>
    </section>
  </main>

  <footer class="container footer">
    <p>Auto-updated with GitHub Actions every 10 minutes.</p>
  </footer>

  <script>
const cardsEl = document.getElementById("cards");
const statusLineEl = document.getElementById("statusLine");
const sourceTimeEl = document.getElementById("sourceTime");
const fetchedTimeEl = document.getElementById("fetchedTime");
const refreshBtn = document.getElementById("refreshBtn");

function formatDateTime(value) {
  if (!value) return "--";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleString();
}

function renderItems(items) {
  if (!items.length) {
    cardsEl.innerHTML = "";
    statusLineEl.textContent = "No products currently in Updating or Testing.";
    return;
  }
  cardsEl.innerHTML = items.map(item => {
    const isTesting = item.status.toLowerCase() === "testing";
    return `<article class="card"><p class="brand">${item.brand}</p><h3 class="game">${item.game}</h3><span class="pill ${isTesting ? "pill-testing" : "pill-updating"}">${item.status}</span><p class="updated">Updated: ${item.updated}</p></article>`;
  }).join("");
  statusLineEl.textContent = items.length + " products currently active (Updating/Testing).";
}

async function loadStatus() {
  refreshBtn.disabled = true;
  statusLineEl.textContent = "Refreshing...";
  try {
    const resp = await fetch('data/status.json');
    const data = await resp.json();
    renderItems(data.items || []);
    sourceTimeEl.textContent = 'Source last updated: ' + (data.lastUpdated || "--");
    fetchedTimeEl.textContent = 'Synced: ' + formatDateTime(data.fetchedAt);
  } catch(e) {
    statusLineEl.textContent = "Error loading feed.";
  }
  refreshBtn.disabled = false;
}

refreshBtn.onclick = loadStatus;
loadStatus();
setInterval(loadStatus, 30000);
  </script>
</body>
</html>
