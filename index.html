<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmo Product Status</title>
  <meta name="description" content="Live product status board showing only Updating and Testing states.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Chakra+Petch:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="cosmic-bg" aria-hidden="true">
    <video class="cosmic-video" autoplay muted loop playsinline preload="auto">
      <source src="./cosmo_final.mp4" type="video/mp4">
    </video>
    <div class="cosmic-overlay"></div>
    <div class="cosmic-stars"></div>
  </div>
  <div class="halo halo-a" aria-hidden="true"></div>
  <div class="halo halo-b" aria-hidden="true"></div>

  <header class="container masthead">
    <nav class="top-nav" aria-label="Main">
      <a class="nav-link active" href="index.html">Status</a>
      <a class="nav-link" href="presentation.html">Support Guide</a>
    </nav>
    <h1>Cosmo Product Status</h1>
    <p class="subtitle">Live tracking for <strong>Updating</strong> and <strong>Testing</strong> products</p>
    <div class="meta">
      <span id="sourceTime">Source: --</span>
      <span id="fetchedTime">Synced: --</span>
      <span id="dataAge">Data age: --</span>
      <span id="refreshCountdown">Next refresh: --</span>
    </div>
  </header>

  <main class="container">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search game or product..." autocomplete="off">
    </div>
    <section class="panel" aria-live="polite">
      <div class="panel-header">
        <h2>All Products <span id="countBadge"></span></h2>
        <div class="filter-row">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="Updating">Updating</button>
          <button class="filter-btn" data-filter="Testing">Testing</button>
        </div>
      </div>
      <p id="statusLine" class="status-line"></p>
      <div id="cards" class="cards"></div>
    </section>
  </main>

  <footer class="container footer">
    <p>Auto-updates every 5 minutes via GitHub Actions</p>
    <p><a class="footer-link" href="presentation.html">Open Embedded Support Guide</a></p>
  </footer>

  <script>
const defaultData = {
  lastUpdated: "April 3, 2026 - 9:59 PM",
  fetchedAt: "2026-04-03T20:00:08.083Z",
  items: [
    {brand: "AstroZoom", game: "Arena Breakout", status: "Updating", updated: "Apr 3, 2026 9:54 PM"},
    {brand: "AstroZoom", game: "Call of Duty", status: "Updating", updated: "Apr 3, 2026 9:54 PM"},
    {brand: "AstroZoom", game: "Delta Force", status: "Updating", updated: "Apr 3, 2026 9:54 PM"},
    {brand: "AstroZoom", game: "FragPunk", status: "Updating", updated: "Apr 3, 2026 9:54 PM"},
    {brand: "AstroZoom", game: "Rust", status: "Updating", updated: "Apr 3, 2026 9:54 PM"},
    {brand: "Forge", game: "Apex-Full", status: "Updating", updated: "Apr 3, 2026 9:54 PM"},
    {brand: "Forge", game: "Apex-Lite", status: "Updating", updated: "Apr 3, 2026 9:54 PM"},
    {brand: "Forge", game: "BF6", status: "Updating", updated: "Apr 3, 2026 9:54 PM"},
    {brand: "Forge", game: "EFT-Full", status: "Updating", updated: "Apr 3, 2026 9:54 PM"},
    {brand: "Forge", game: "EFT-Lite", status: "Updating", updated: "Apr 3, 2026 9:54 PM"},
    {brand: "Forge", game: "Fortnite", status: "Updating", updated: "Apr 3, 2026 9:54 PM"},
    {brand: "Forge", game: "Rust", status: "Updating", updated: "Apr 3, 2026 9:54 PM"},
    {brand: "Hero", game: "Apex Legends", status: "Updating", updated: "Apr 3, 2026 9:54 PM"},
    {brand: "Hero", game: "Delta Force", status: "Updating", updated: "Apr 3, 2026 9:54 PM"},
    {brand: "Hero", game: "EFT Full", status: "Updating", updated: "Apr 3, 2026 9:59 PM"},
    {brand: "Hero", game: "Rainbow Six Siege: Full", status: "Updating", updated: "Apr 3, 2026 9:54 PM"},
    {brand: "Hero", game: "Rainbow Six Siege: Lite", status: "Updating", updated: "Apr 3, 2026 9:54 PM"},
    {brand: "Hero", game: "Rust", status: "Updating", updated: "Apr 3, 2026 9:54 PM"},
    {brand: "Kane", game: "Active Matter", status: "Updating", updated: "Feb 15, 2026 8:15 PM"},
    {brand: "Kane", game: "Dark and Darker", status: "Updating", updated: "Mar 20, 2026 11:47 AM"},
    {brand: "Kane", game: "Gray Zone Warfare", status: "Updating", updated: "Jan 20, 2026 8:12 PM"},
    {brand: "Kane", game: "Spoofer", status: "Testing", updated: "Feb 12, 2026 9:52 AM"},
    {brand: "Kane", game: "THE FINALS", status: "Updating", updated: "Mar 27, 2026 8:16 AM"},
    {brand: "Kane", game: "WarThunder", status: "Updating", updated: "Apr 1, 2026 1:30 PM"},
    {brand: "Liquid", game: "Apex", status: "Testing", updated: "Apr 3, 2026 7:06 PM"},
    {brand: "Liquid", game: "Arena Breakout", status: "Updating", updated: "Dec 24, 2025 3:00 AM"},
    {brand: "Liquid", game: "Delta Force", status: "Updating", updated: "Feb 12, 2026 11:55 AM"},
    {brand: "Liquid", game: "EFT", status: "Updating", updated: "Apr 3, 2026 6:30 PM"},
    {brand: "Liquid", game: "EFT Chams", status: "Updating", updated: "Apr 3, 2026 6:30 PM"},
    {brand: "Liquid", game: "Hunt: Showdown", status: "Updating", updated: "Mar 18, 2026 2:04 PM"},
    {brand: "Liquid", game: "Marvel Rivals", status: "Updating", updated: "Dec 24, 2025 3:00 AM"},
    {brand: "Pulse", game: "ARC Raiders", status: "Updating", updated: "Apr 3, 2026 9:58 PM"},
    {brand: "Pulse", game: "CS2", status: "Updating", updated: "Apr 3, 2026 9:58 PM"},
    {brand: "Vex", game: "EAC Spoofer", status: "Updating", updated: "Apr 3, 2026 9:59 PM"},
    {brand: "Viper", game: "Arena Breakout Infinite", status: "Updating", updated: "Apr 3, 2026 9:58 PM"},
    {brand: "Viper", game: "ARK Survival Ascended", status: "Updating", updated: "Apr 3, 2026 9:58 PM"},
    {brand: "Viper", game: "Battlefield 6", status: "Updating", updated: "Apr 3, 2026 9:58 PM"},
    {brand: "Viper", game: "Beasts of Bermuda", status: "Updating", updated: "Apr 3, 2026 9:58 PM"},
    {brand: "Viper", game: "Dune Awakening", status: "Updating", updated: "Feb 3, 2026 10:58 PM"},
    {brand: "Viper", game: "Escape From Tarkov", status: "Updating", updated: "Apr 3, 2026 9:58 PM"},
    {brand: "Viper", game: "Marathon", status: "Updating", updated: "Apr 3, 2026 9:58 PM"}
  ]
};
var allItems = defaultData.items;
var currentFilter = "all";
var cardsEl = document.getElementById("cards");
var statusLineEl = document.getElementById("statusLine");
var sourceTimeEl = document.getElementById("sourceTime");
var fetchedTimeEl = document.getElementById("fetchedTime");
var dataAgeEl = document.getElementById("dataAge");
var refreshCountdownEl = document.getElementById("refreshCountdown");
var searchInput = document.getElementById("searchInput");
var countBadge = document.getElementById("countBadge");
var nextRefreshAt = 0;
var latestFetchedAt = null;

function renderItems(items) {
  if (!items.length) { cardsEl.innerHTML = ""; statusLineEl.textContent = "No products match your search."; countBadge.textContent = "(0)"; return; }
  cardsEl.innerHTML = items.map(function(item) { return "<article class=\"card\"><p class=\"brand\">"+item.brand+"</p><h3 class=\"game\">"+item.game+"</h3><span class=\"pill "+(item.status.toLowerCase() === "testing" ? "pill-testing" : "pill-updating")+"\">"+item.status+"</span><p class=\"updated\">Updated: "+item.updated+"</p></article>"; }).join("");
  statusLineEl.textContent = "";
  countBadge.textContent = "("+items.length+")";
}

function filterItems() {
  var query = searchInput.value.toLowerCase().trim();
  var filtered = allItems;
  if (currentFilter !== "all") filtered = filtered.filter(function(i) { return i.status === currentFilter; });
  if (query) filtered = filtered.filter(function(i) { return i.game.toLowerCase().includes(query) || i.brand.toLowerCase().includes(query); });
  renderItems(filtered);
}

document.querySelectorAll(".filter-btn").forEach(function(btn) {
  btn.onclick = function() {
    document.querySelectorAll(".filter-btn").forEach(function(b) { b.classList.remove("active"); });
    this.classList.add("active");
    currentFilter = this.getAttribute("data-filter");
    filterItems();
  };
});

searchInput.addEventListener("input", filterItems);

function formatDateTime(value) { if (!value) return "--"; var d = new Date(value); return isNaN(d.getTime()) ? value : d.toLocaleString(); }

function formatAge(date) {
  if (!date) return "--";
  var diffSec = Math.max(0, Math.floor((Date.now() - date.getTime()) / 1000));
  if (diffSec < 60) return diffSec + "s";
  var mins = Math.floor(diffSec / 60);
  var secs = diffSec % 60;
  return mins + "m " + secs + "s";
}

function tickTimers() {
  if (nextRefreshAt > 0) {
    var secLeft = Math.max(0, Math.ceil((nextRefreshAt - Date.now()) / 1000));
    refreshCountdownEl.textContent = "Next refresh: " + secLeft + "s";
  }
  dataAgeEl.textContent = "Data age: " + formatAge(latestFetchedAt);
}

function applyLiveData(data) {
  allItems = (data && data.items && data.items.length) ? data.items : defaultData.items;
  latestFetchedAt = new Date((data && data.fetchedAt) ? data.fetchedAt : defaultData.fetchedAt);
  filterItems();
  sourceTimeEl.textContent = "Source: " + ((data && data.lastUpdated) ? data.lastUpdated : defaultData.lastUpdated);
  fetchedTimeEl.textContent = "Synced: " + formatDateTime((data && data.fetchedAt) ? data.fetchedAt : defaultData.fetchedAt);
  tickTimers();
}

function loadLiveStatus() {
  nextRefreshAt = Date.now() + 30000;
  fetch("data/status.json?t=" + Date.now(), { cache: "no-store" })
    .then(function (res) {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    })
    .then(function (data) {
      applyLiveData(data);
    })
    .catch(function () {
      applyLiveData(defaultData);
    });
}

loadLiveStatus();
setInterval(loadLiveStatus, 30000);
setInterval(tickTimers, 1000);
  </script>
</body>
</html>
