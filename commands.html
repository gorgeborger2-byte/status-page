<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commands</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css?v=20260406k">
</head>
<body data-page="commands">
  <div class="shell">
    <aside class="sidebar">
      <div class="brand"><div class="brand-mark"></div><div><h1>Cosmo Ops</h1><p id="whoami">Loading...</p></div></div>
      <nav class="nav">
        <a href="index.html">Status</a>
        <a href="presentation.html">Guide</a>
        <a class="active" href="commands.html">Commands</a>
        <a href="profile.html" data-auth-only>Profile</a>
        <a href="admin.html" data-boss-only>Admin</a>
        <button id="logoutBtn" data-auth-only>Logout</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div><h2>Command Center</h2><p>Search and copy support responses quickly.</p></div>
        <div class="topbar-actions"><span class="chip" id="commandCount">0 commands</span></div>
      </header>

      <div class="grid-2">
        <section class="panel stack">
          <input id="commandSearch" placeholder="Search commands and responses..." autocomplete="off">
          <p class="state" id="commandState"></p>
          <div class="stack" id="commandHost"></div>
        </section>

        <section class="panel stack" id="commandAdminPanel" style="display:none;">
          <h3>Admin Command Manager</h3>
          <form id="addCommandForm" class="stack">
            <input id="newCommand" placeholder="*command" required>
            <textarea id="newResponse" placeholder="Command response" required></textarea>
            <button type="submit">Add Command</button>
          </form>
        </section>
      </div>
      <p class="state" id="globalState"></p>
    </main>
  </div>

  <nav class="mobile-nav">
    <a href="index.html">Status</a>
    <a href="presentation.html">Guide</a>
    <a class="active" href="commands.html">Commands</a>
    <a href="profile.html" data-auth-only>Profile</a>
    <a href="admin.html" data-boss-only>Admin</a>
    <button id="logoutBtnMobile" data-auth-only>Logout</button>
  </nav>

  <script src="app.js?v=20260406k" defer></script>
</body>
</html>
