name: Update status feed

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch status page
        env:
          STATUS_PASSWORD: ${{ secrets.STATUS_PASSWORD }}
          STATUS_URL: https://support.cosmotickets.com/status/index.php
        run: node scripts/fetch-status.mjs

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/status.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh status feed"
          git push
